<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>SRMS — Reset Password</title>
  <link rel="stylesheet" th:href="@{/css/srms.css}"/>
  <style>
    .nav { background: rgba(255,255,255,0.96); backdrop-filter: blur(8px); box-shadow: 0 2px 12px rgba(24,95,165,0.10); }
    .auth-wrap { min-height: calc(100vh - 52px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .auth-card { background: rgba(255,255,255,0.97); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); }
    .auth-logo { width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg,#185FA5,#0C447C); display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 1.25rem; }
    .auth-title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .auth-sub { font-size: 13px; color: #666; margin-bottom: 1.75rem; }
    a { color: #185FA5; font-size: 13px; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand"><div class="dot"></div> SRMS — Semester Registration</div>
  </nav>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🔒</div>
      <div class="auth-title">Reset Password</div>
      <div class="auth-sub">Set a new password for your account.</div>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div th:if="${success}" class="alert alert-success">
        Password reset successfully! <a th:href="@{/login}">Sign in now</a>
      </div>

      <form th:if="${!success and error == null or (!success and error != null and token != null)}"
            method="post" th:action="@{/reset-password/{token}(token=${token})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input class="form-input" type="password" name="password" placeholder="Min. 6 characters" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input class="form-input" type="password" name="confirm_password" placeholder="Repeat password" required/>
        </div>
        <button class="btn-primary btn-full" type="submit">Set New Password</button>
      </form>

      <div style="margin-top:1.25rem;text-align:center;">
        <a th:href="@{/login}">← Back to Login</a>
      </div>
    </div>
  </div>
</body>
</html>
