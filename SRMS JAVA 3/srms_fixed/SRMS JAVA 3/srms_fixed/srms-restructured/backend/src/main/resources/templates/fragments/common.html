<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ── HEAD ────────────────────────────────────────────────────────── -->
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'SRMS — ' + ${title}">SRMS</title>
  <link rel="stylesheet" th:href="@{/css/srms.css}"/>
</head>

<!-- ── NAV ─────────────────────────────────────────────────────────── -->
<nav th:fragment="nav" class="nav">
  <div class="nav-brand"><div class="dot"></div> SRMS — Semester Registration</div>
  <div class="nav-right" sec:authorize="isAuthenticated()">
    <span class="nav-user" sec:authentication="name">User</span>
    <div class="nav-avatar" sec:authentication="name">??</div>
    <form th:action="@{/logout}" method="post" style="display:inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn-logout">Log out</button>
    </form>
  </div>
</nav>

<!-- ── FLASH MESSAGES ───────────────────────────────────────────────── -->
<div th:fragment="flash">
  <div th:if="${flash}" style="padding:0 1.5rem;margin-top:0.75rem">
    <div class="alert" th:classappend="'alert-' + ${flash_type != null ? flash_type : 'info'}"
         th:text="${flash}"></div>
  </div>
  <div th:if="${flash2}" style="padding:0 1.5rem;margin-top:0.25rem">
    <div class="alert" th:classappend="'alert-' + ${flash_type2 != null ? flash_type2 : 'info'}"
         th:text="${flash2}"></div>
  </div>
  <!-- RedirectAttributes flash -->
  <div th:if="${flashAttr}" style="padding:0 1.5rem;margin-top:0.75rem">
    <div class="alert alert-info" th:text="${flashAttr}"></div>
  </div>
</div>

</html>
