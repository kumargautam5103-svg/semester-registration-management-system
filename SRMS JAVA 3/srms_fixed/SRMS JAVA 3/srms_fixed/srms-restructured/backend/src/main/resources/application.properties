# ============================================================
# SRMS - Semester Registration Management System
# Spring Boot Configuration — Neon PostgreSQL Edition
# ============================================================

spring.application.name=SRMS

# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── Neon PostgreSQL ─────────────────────────────────────────
# OPTION A: Set real values directly below (recommended for local dev)
# OPTION B: Set DATABASE_URL, DB_USERNAME, DB_PASSWORD as system environment variables
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/srmsdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ── Email (Gmail SMTP) ──────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from.name=SRMS Portal
spring.mail.from.address=${MAIL_FROM_ADDRESS:your-email@gmail.com}

# Disable mail auto-config failure if credentials aren't set
spring.mail.test-connection=false

# ── File Upload ─────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
srms.upload.dir=uploads/fee_receipts

# ── Thymeleaf ───────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Session ─────────────────────────────────────────────────
server.servlet.session.timeout=60m

# ── Logging ─────────────────────────────────────────────────
logging.level.com.srms=DEBUG
logging.level.org.springframework.security=INFO
